<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Torre de Controle - PulseGym</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; padding: 20px; }
        h1 { text-align: center; color: #00ff88; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background-color: #1e1e1e; padding: 20px; border-radius: 10px; border-top: 4px solid #00ff88; }
        .card h2 { margin-top: 0; color: #00ff88; }
        .fila { background-color: #ff4444; padding: 20px; border-radius: 10px; margin-top: 20px; text-align: center; }
        ul { list-style-type: none; padding: 0; }
        li { background: #333; margin: 5px 0; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>🏋️ Torre de Controle - Salão</h1>
    
    <div class="fila" id="bloco-espera" style="display: none;">
        <h2>⚠️ Fila de Espera (Professores Lotados)</h2>
        <ul id="lista-espera"></ul>
    </div>

    <div class="grid" id="painel-professores">
        </div>

    <script>
        // Função que vai no backend buscar os dados
        async function atualizarTV() {
            try {
                const response = await fetch('http://127.0.0.1:8000/api/evo/tv/');
                const data = await response.json();
                
                // 1. Renderiza a Fila de Espera
                const blocoEspera = document.getElementById('bloco-espera');
                const listaEspera = document.getElementById('lista-espera');
                listaEspera.innerHTML = '';
                
                if (data.fila_espera.length > 0) {
                    blocoEspera.style.display = 'block';
                    data.fila_espera.forEach(aluno => {
                        listaEspera.innerHTML += `<li>🕒 ${aluno}</li>`;
                    });
                } else {
                    blocoEspera.style.display = 'none';
                }

                // 2. Renderiza os Professores
                const painel = document.getElementById('painel-professores');
                painel.innerHTML = '';

                data.instrutores.forEach(prof => {
                    let listaAlunos = '';
                    prof.alunos.forEach(aluno => {
                        listaAlunos += `<li>💪 ${aluno}</li>`;
                    });

                    painel.innerHTML += `
                        <div class="card">
                            <h2>${prof.nome}</h2>
                            <p>Ocupação: ${prof.ocupacao} / ${prof.capacidade}</p>
                            <ul>${listaAlunos}</ul>
                        </div>
                    `;
                });

            } catch (error) {
                console.error("Erro ao conectar com o servidor Django:", error);
            }
        }

        // Roda a primeira vez imediatamente
        atualizarTV();
        // Fica atualizando sozinho a cada 3 segundos (Simulando o tempo real)
        setInterval(atualizarTV, 3000);
    </script>
</body>
</html>
